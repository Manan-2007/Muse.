<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Muse.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="player">
        <div class="wrapper" style="justify-content: center; padding: 40px; padding-top: 80px;">
            <div class="top-bar">
                <a href="home.html" class="logo-link">
                    <h1 class="logo"><span class="logo-red">Muse</span><span class="logo-white">.</span></h1>
                </a>
            </div>

            <div class="auth-container">
                <div class="auth-icon">
                    <i class="fas fa-music"></i>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join the music revolution</p>

                <form id="signupForm" onsubmit="handleSignup(event)" style="width: 100%;">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="signupUsername" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="signupEmail" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" placeholder="Password" required minlength="4">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required minlength="4">
                    </div>
                    <button type="submit">SIGN UP</button>
                </form>

                <div class="auth-error" id="signupError" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="signupErrorText"></span>
                </div>

                <div class="auth-success" id="signupSuccess" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span id="signupSuccessText"></span>
                </div>

                <div class="auth-divider"><span>or</span></div>

                <div class="auth-footer">
                    <span style="color: #B3B3B3;">Already have an account? </span>
                    <a href="login.html" style="font-weight: bold;">Log In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function handleSignup(event) {
            event.preventDefault();
            var username = document.getElementById('signupUsername').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;
            var confirmPassword = document.getElementById('signupConfirmPassword').value;
            var errorEl = document.getElementById('signupError');
            var errorText = document.getElementById('signupErrorText');
            var successEl = document.getElementById('signupSuccess');
            var successText = document.getElementById('signupSuccessText');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (password !== confirmPassword) {
                errorEl.style.display = 'flex';
                errorText.textContent = 'Passwords do not match!';
                errorEl.classList.remove('shake');
                void errorEl.offsetWidth;
                errorEl.classList.add('shake');
                return;
            }

            var result = AuthManager.signup(username, email, password);
            if (result.success) {
                successEl.style.display = 'flex';
                successText.textContent = result.message;
                setTimeout(function() { window.location.href = 'home.html'; }, 1500);
            } else {
                errorEl.style.display = 'flex';
                errorText.textContent = result.message;
                errorEl.classList.remove('shake');
                void errorEl.offsetWidth;
                errorEl.classList.add('shake');
            }
        }
    </script>
</body>

</html>
