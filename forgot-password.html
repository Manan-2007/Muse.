<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Muse.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="player">
        <div class="wrapper" style="justify-content: center; padding: 40px; padding-top: 80px;">
            <div class="top-bar">
                <a href="home.html" class="logo-link">
                    <h1 class="logo"><span class="logo-red">Muse</span><span class="logo-white">.</span></h1>
                </a>
            </div>

            <div class="auth-container">
                <!-- Step 1: Enter Email -->
                <div id="step1">
                    <div class="auth-icon">
                        <i class="fas fa-key"></i>
                    </div>
                    <h1 class="auth-title">Forgot Password?</h1>
                    <p class="auth-subtitle">Enter your email to reset your password</p>

                    <form onsubmit="handleForgotStep1(event)" style="width: 100%;">
                        <div class="input-group">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                        </div>
                        <button type="submit">SEND RESET CODE</button>
                    </form>

                    <div class="auth-error" id="step1Error" style="display: none;">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="step1ErrorText"></span>
                    </div>
                </div>

                <!-- Step 2: Enter Code -->
                <div id="step2" style="display: none;">
                    <div class="auth-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h1 class="auth-title">Verify Code</h1>
                    <p class="auth-subtitle">Enter the 6-digit code sent to your email</p>

                    <form onsubmit="handleForgotStep2(event)" style="width: 100%;">
                        <div class="otp-container" id="otpContainer">
                            <input type="text" maxlength="1" class="otp-input" data-index="0" autocomplete="off">
                            <input type="text" maxlength="1" class="otp-input" data-index="1" autocomplete="off">
                            <input type="text" maxlength="1" class="otp-input" data-index="2" autocomplete="off">
                            <input type="text" maxlength="1" class="otp-input" data-index="3" autocomplete="off">
                            <input type="text" maxlength="1" class="otp-input" data-index="4" autocomplete="off">
                            <input type="text" maxlength="1" class="otp-input" data-index="5" autocomplete="off">
                        </div>
                        <p class="otp-hint" id="otpHint"></p>
                        <button type="submit">VERIFY CODE</button>
                    </form>

                    <div class="auth-error" id="step2Error" style="display: none;">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="step2ErrorText"></span>
                    </div>
                </div>

                <!-- Step 3: New Password -->
                <div id="step3" style="display: none;">
                    <div class="auth-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                        <i class="fas fa-lock-open"></i>
                    </div>
                    <h1 class="auth-title">New Password</h1>
                    <p class="auth-subtitle">Create a strong new password</p>

                    <form onsubmit="handleForgotStep3(event)" style="width: 100%;">
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="newPassword" placeholder="New Password" required minlength="4">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required minlength="4">
                        </div>
                        <button type="submit">RESET PASSWORD</button>
                    </form>

                    <div class="auth-error" id="step3Error" style="display: none;">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="step3ErrorText"></span>
                    </div>
                </div>

                <!-- Step 4: Success -->
                <div id="step4" style="display: none;">
                    <div class="auth-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                        <i class="fas fa-check"></i>
                    </div>
                    <h1 class="auth-title">Password Reset!</h1>
                    <p class="auth-subtitle">Your password has been updated successfully</p>
                    <a href="login.html" class="btn-link">
                        <button type="button">GO TO LOGIN</button>
                    </a>
                </div>

                <!-- Progress Steps -->
                <div class="forgot-steps" id="progressSteps">
                    <div class="step-dot active" id="dot1"></div>
                    <div class="step-dot" id="dot2"></div>
                    <div class="step-dot" id="dot3"></div>
                    <div class="step-dot" id="dot4"></div>
                </div>

                <div class="auth-footer" style="margin-top: 20px;">
                    <span style="color: #B3B3B3;">Remember your password? </span>
                    <a href="login.html" style="font-weight: bold;">Log In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        var resetEmail = '';
        var generatedCode = '';

        // OTP input auto-focus behavior
        var otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach(function(inp, idx) {
            inp.addEventListener('input', function() {
                if (inp.value.length === 1 && idx < otpInputs.length - 1) {
                    otpInputs[idx + 1].focus();
                }
            });
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && inp.value === '' && idx > 0) {
                    otpInputs[idx - 1].focus();
                }
            });
        });

        function setStep(step) {
            document.getElementById('step1').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('step2').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('step3').style.display = step === 3 ? 'block' : 'none';
            document.getElementById('step4').style.display = step === 4 ? 'block' : 'none';
            for (var i = 1; i <= 4; i++) {
                var dot = document.getElementById('dot' + i);
                dot.className = 'step-dot' + (i <= step ? ' active' : '');
            }
        }

        function handleForgotStep1(event) {
            event.preventDefault();
            var email = document.getElementById('forgotEmail').value.trim();
            var errorEl = document.getElementById('step1Error');
            var errorText = document.getElementById('step1ErrorText');

            var result = AuthManager.forgotPassword(email);
            if (result.success) {
                resetEmail = email;
                generatedCode = result.code;
                document.getElementById('otpHint').textContent = 'Code: ' + generatedCode + ' (simulated)';
                errorEl.style.display = 'none';
                setStep(2);
                setTimeout(function() { otpInputs[0].focus(); }, 100);
            } else {
                errorEl.style.display = 'flex';
                errorText.textContent = result.message;
                errorEl.classList.remove('shake');
                void errorEl.offsetWidth;
                errorEl.classList.add('shake');
            }
        }

        function handleForgotStep2(event) {
            event.preventDefault();
            var errorEl = document.getElementById('step2Error');
            var errorText = document.getElementById('step2ErrorText');
            var enteredCode = '';
            otpInputs.forEach(function(inp) { enteredCode += inp.value; });

            if (enteredCode === generatedCode) {
                errorEl.style.display = 'none';
                setStep(3);
            } else {
                errorEl.style.display = 'flex';
                errorText.textContent = 'Invalid code. Please try again.';
                errorEl.classList.remove('shake');
                void errorEl.offsetWidth;
                errorEl.classList.add('shake');
            }
        }

        function handleForgotStep3(event) {
            event.preventDefault();
            var newPass = document.getElementById('newPassword').value;
            var confirmPass = document.getElementById('confirmNewPassword').value;
            var errorEl = document.getElementById('step3Error');
            var errorText = document.getElementById('step3ErrorText');

            if (newPass !== confirmPass) {
                errorEl.style.display = 'flex';
                errorText.textContent = 'Passwords do not match!';
                errorEl.classList.remove('shake');
                void errorEl.offsetWidth;
                errorEl.classList.add('shake');
                return;
            }

            var result = AuthManager.resetPassword(resetEmail, newPass);
            if (result.success) {
                errorEl.style.display = 'none';
                setStep(4);
            } else {
                errorEl.style.display = 'flex';
                errorText.textContent = result.message;
            }
        }
    </script>
</body>

</html>
