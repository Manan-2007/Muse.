<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Muse.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="player">
        <div class="wrapper">
            <div class="top-bar">
                <a href="home.html" class="logo-link">
                    <h1 class="logo"><span class="logo-red">Muse</span><span class="logo-white">.</span></h1>
                </a>
            </div>

            <div class="content-area">
                <div class="details">
                    <h2 style="margin-bottom: 20px;">Your Library</h2>
                </div>

                <div style="margin-bottom: 20px;">
                    <input type="text" id="searchInput" onkeyup="filterSongs()" placeholder="Search songs..."
                        style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%;">
                </div>

                <table class="song-list" id="songTable">
                    <thead>
                        <tr>
                            <th>Track</th>
                            <th style="text-align: right; width: 60px;">Time</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>

            </div>
            <nav class="nav-bar">
                <a href="home.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="playlists.html" class="nav-item">
                    <i class="fas fa-layer-group"></i>
                    <span>Playlists</span>
                </a>
                <a href="library.html" class="nav-item active">
                    <i class="fas fa-list"></i>
                    <span>Library</span>
                </a>
                <a href="about.html" class="nav-item">
                    <i class="fas fa-user-friends"></i>
                    <span>About</span>
                </a>
                <a href="login.html" class="nav-item" id="navLoginBtn">
                    <i class="fas fa-user-circle"></i>
                    <span id="navLoginText">Login</span>
                </a>
            </nav>
        </div>
    </div>

    <script src="songs.js"></script>
    <script src="auth.js"></script>
    <script>
        const tableBody = document.querySelector('#songTable tbody');

        music_list.forEach((song, index) => {
            let row = tableBody.insertRow();
            let cell1 = row.insertCell(0);
            let cell2 = row.insertCell(1);

            row.style.cursor = 'pointer';
            row.onclick = function () {
                window.location.href = 'player.html?track=' + index;
            };

            cell1.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <img src="${song.img}" alt="${song.name}">
                    <div>
                        <div style="font-size: 0.95rem; color: white; font-weight: 600;">${song.name}</div>
                        <div style="font-size: 0.85rem; color: #98989d;">${song.artist}</div>
                    </div>
                </div>
            `;
            cell2.innerHTML = `<span style="color: #98989d; font-size: 0.85rem;">${song.duration}</span>`;
            cell2.style.textAlign = "right";
        });

        function filterSongs() {
            let input, filter, table, tr, td, i, txtValue;
            input = document.getElementById("searchInput");
            filter = input.value.toUpperCase();
            table = document.getElementById("songTable");
            tr = table.getElementsByTagName("tr");

            for (i = 0; i < tr.length; i++) {
                td = tr[i].getElementsByTagName("div")[0];
                if (td) {
                    txtValue = td.textContent || td.innerText;
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }

        AuthManager.updateNavLogin();
    </script>
</body>

</html>
