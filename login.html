<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Muse.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="player">
        <div class="wrapper" style="justify-content: center; padding: 40px; padding-top: 80px;">
            <div class="top-bar">
                <a href="home.html" class="logo-link">
                    <h1 class="logo"><span class="logo-red">Muse</span><span class="logo-white">.</span></h1>
                </a>
            </div>

            <div class="auth-container">
                <div class="auth-icon">
                    <i class="fas fa-headphones-alt"></i>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to your account</p>

                <form id="loginForm" onsubmit="handleLogin(event)" style="width: 100%;">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="loginUsername" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                    </div>

                    <div class="auth-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit">LOG IN</button>
                </form>

                <div class="auth-error" id="loginError" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorText"></span>
                </div>

                <div class="auth-divider">
                    <span>or</span>
                </div>

                <div class="auth-footer">
                    <span style="color: #B3B3B3;">Don't have an account? </span>
                    <a href="signup.html" style="font-weight: bold;">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');

            const result = AuthManager.login(username, password);
            if (result.success) {
                errorEl.style.display = 'none';
                window.location.href = 'home.html';
            } else {
                errorEl.style.display = 'flex';
                errorText.textContent = result.message;
                // Shake animation
                errorEl.classList.remove('shake');
                void errorEl.offsetWidth;
                errorEl.classList.add('shake');
            }
        }

        // If already logged in, redirect
        if (AuthManager.isLoggedIn()) {
            // Show option to go home or log out
        }
    </script>
</body>

</html>
