<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Muse.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="player">
        <div class="wrapper" style="justify-content: center; padding: 40px; padding-top: 80px;">
            <div class="top-bar">
                <h1 class="logo"><span class="logo-red">Muse</span><span class="logo-white">.</span></h1>
            </div>
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="font-size: 2rem; color: white;">Welcome Back</h1>
                <p>Login to your account</p>
            </div>

            <form onsubmit="handleLogin(event)" style="width: 100%;">
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">LOG IN</button>
            </form>

            <div style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                <span style="color: #B3B3B3;">Don't have an account? </span>
                <a href="signup.html" style="font-weight: bold;">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.querySelector('input[type="text"]').value;
            alert("Welcome " + username);
            window.location.href = "home.html";
        }
    </script>
</body>

</html>
